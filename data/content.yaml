Profile: "Experienced technology professional that helped scale two startups into acquisitions by public companies in the past ten years.
<br /><br />Scott leads engineering teams. He has a wide breadth of growth experience, from building interactive website properties for the Hubble Space Telescope to tenures at high-growth private equity-backed technology companies.
<br /><br />I'm a remote work advocate with over 17 years of experience working remotely. I've built teams of engineers from 2 to 40 in under 18 months by leveraging the latest tools and techniques for remote collaboration.
<br /><br />I’m a software engineer at heart with a passion for developing and growing engineering teams and companies.
<br /><br />I am a huge advocate of Effective vs. Efficient when it comes to building teams. Engineering teams perform when they are given not work just to be busy but work that allows them to add the most VALUE. An effective team can accomplish its goals and objectives, while an efficient team may deliver faster, but it may not be the correct thing.
<br /><br />I am also a huge advocate and supporter of opensource software i was a core team member of Sass and Compass style sheet framework from 2008 - 2013
"

